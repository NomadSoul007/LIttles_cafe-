  <script>
    (function () {
      document.querySelectorAll('.carousel').forEach((carousel) => {
        const track = carousel.querySelector('.carousel-track');
        const slides = Array.from(carousel.querySelectorAll('.carousel-slide'));
        const dots = Array.from(carousel.querySelectorAll('.dot'));
        const prev = carousel.querySelector('.prev');
        const next = carousel.querySelector('.next');
        if (!track || slides.length === 0) return;
        let current = 0;
        let timer = null;
        let startX = 0;
        function show(index) {
          current = (index + slides.length) % slides.length;
          track.style.transform = `translateX(-${current * 100}%)`;
          dots.forEach((dot, i) => dot.classList.toggle('active', i === current));
        }
        function restart() { if (timer) clearInterval(timer); timer = setInterval(() => show(current + 1), 4500); }
        prev && prev.addEventListener('click', (e) => { e.preventDefault(); show(current - 1); restart(); });
        next && next.addEventListener('click', (e) => { e.preventDefault(); show(current + 1); restart(); });
        dots.forEach((dot, i) => dot.addEventListener('click', () => { show(i); restart(); }));
        carousel.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
        carousel.addEventListener('touchend', (e) => {
          const diff = e.changedTouches[0].clientX - startX;
          if (Math.abs(diff) > 40) { show(current + (diff < 0 ? 1 : -1)); restart(); }
        });
        show(0); restart();
      });
    })();
  </script>
